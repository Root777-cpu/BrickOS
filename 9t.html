<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrickOS - Redmi 9T</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
}

/* Background animation */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Back button */
.back {
  position: absolute;
  top: 20px;
  left: 20px;
  text-decoration: none;
  color: white;
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

/* Container */
.container {
  padding: 70px 20px;
  text-align: center;
}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 25px;
  animation: fadeUp 1s ease;
}

/* Images */
.rom-img {
  width: 90%;
  border-radius: 15px;
  margin: 10px 0;
  transition: 0.3s;
}

.rom-img:hover {
  transform: scale(1.05);
}

/* Button */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  background: linear-gradient(45deg, #ff3c3c, #ff7a7a);
  border-radius: 10px;
  text-decoration: none;
  color: white;
}

/* Animation */
@keyframes fadeUp {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<div class="container">
  <div class="card">
    <h2>Redmi 9T (Chime)</h2>
    <p>Android 14 • HyperOS Port</p>

    <img src="Images/9t1.jpg" class="rom-img">
    <img src="Images/9t2.jpg" class="rom-img">

    <a href="https://t.me/YOUR_LINK" class="btn">Download via Telegram</a>
  </div>
</div>

</body>
</html>
