<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrickOS - Redmi 9T</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1c3d3a, #6fb3a8, #f5d6c6);
  color: white;
}

.container {
  padding: 20px;
  text-align: center;
}

/* Glass card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  animation: fadeUp 1s ease;
}

/* Image styling */
.rom-img {
  width: 90%;
  border-radius: 15px;
  margin: 10px 0;
  transition: 0.3s;
}

.rom-img:hover {
  transform: scale(1.03);
}

/* Button */
.btn {
  display: inline-block;
  padding: 12px 20px;
  background: linear-gradient(45deg, #ff7a7a, #ff3c3c);
  border-radius: 10px;
  text-decoration: none;
  color: white;
  margin-top: 15px;
}

/* Animation */
@keyframes fadeUp {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>
  
<a href="index.html" class="back">⬅ Back</a>

<div class="container">
  <div class="card">
    <h2>Redmi 9T (Chime)</h2>
    <p>Android 15 | OxygenOS Port</p>

    <!-- ROM Images -->
    <img src="images/9t1.jpg" class="rom-img">
    <img src="images/9t2.jpg" class="rom-img">

    <a href="https://t.me/BrickOS_team/49" class="btn">Download via Telegram</a>
  </div>
 
</div>

</body>
</html>
