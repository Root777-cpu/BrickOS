<link rel="stylesheet" href="style.css"> in the <head>.

<!-- Device Selection Section -->
    <section class="max-w-7xl mx-auto px-8 py-24">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-12">
            <div>
                <h2 class="text-4xl font-extrabold text-gray-900 mb-2">Find your device.</h2>
                <p class="text-gray-500 text-lg">Select your model to get the latest BrickOS build.</p>
            </div>
            <div class="mt-6 md:mt-0">
                <input type="text" placeholder="Search codename..." class="px-6 py-3 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none transition w-full md:w-64 bg-gray-50">
            </div>
        </div>

        <!-- Device Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Device Card: Xiaomi 11i -->
            <div class="group border-2 border-gray-100 rounded-2xl p-6 hover:border-red-500 transition-all cursor-pointer bg-white">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest">pissaro</span>
                    <span class="text-green-500 text-xs font-bold flex items-center">● Stable</span>
                </div>
                <h3 class="text-xl font-bold text-gray-900 group-hover:text-red-500 transition">Xiaomi 11i</h3>
                <p class="text-gray-500 text-sm mt-1 mb-6"> All modded roms </p>
                <button class="w-full py-3 bg-gray-900 text-white rounded-xl font-semibold group-hover:bg-brick-red transition">Download Build</button>
            </div>

            <!-- Device Card: Redmi 9T -->
            <div class="group border-2 border-gray-100 rounded-2xl p-6 hover:border-red-500 transition-all cursor-pointer bg-white">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest">chime</span>
                    <span class="text-green-500 text-xs font-bold flex items-center">● Stable</span>
                </div>
                <h3 class="text-xl font-bold text-gray-900 group-hover:text-red-500 transition">Redmi 9T</h3>
                <p class="text-gray-500 text-sm mt-1 mb-6">All modded roms </p>
                <button class="w-full py-3 bg-gray-900 text-white rounded-xl font-semibold group-hover:bg-brick-red transition">Download Build</button>
            </div>

            <!-- Device Card: Redmi Note 13 5G -->
            <div class="group border-2 border-gray-100 rounded-2xl p-6 hover:border-red-500 transition-all cursor-pointer bg-white">
                <div class="flex justify-between items-start mb-4">
                    <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-md text-xs font-bold uppercase tracking-widest">ruby</span>
                    <span class="text-yellow-500 text-xs font-bold flex items-center">● Stable </span>
                </div>
                <h3 class="text-xl font-bold text-gray-900 group-hover:text-red-500 transition">Redmi Note 13 5G</h3>
                <p class="text-gray-500 text-sm mt-1 mb-6"> All modded roms </p>
                <button class="w-full py-3 bg-gray-900 text-white rounded-xl font-semibold group-hover:bg-brick-red transition">Download Build</button>
            </div>

        </div>
    </section>
