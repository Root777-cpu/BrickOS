<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrickOS</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1c3d3a, #6fb3a8, #f5d6c6);
  color: white;
  overflow-x: hidden;
}

/* Glass effect */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* Header */
header {
  text-align: center;
  padding: 50px 20px;
  animation: fadeDown 1s ease;
}

header h1 {
  font-size: 40px;
  margin: 0;
}

header p {
  color: #eee;
}

/* Buttons */
.btn {
  display: block;
  margin: 20px auto;
  width: 260px;
  padding: 15px;
  text-decoration: none;
  color: white;
  border-radius: 12px;
  text-align: center;
  font-size: 18px;
  transition: 0.3s;
  background: linear-gradient(45deg, #ff7a7a, #ff3c3c);
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,80,80,0.6);
}

/* Animations */
@keyframes fadeDown {
  from {opacity:0; transform: translateY(-40px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <h1>🧱 BrickOS</h1>
  <p>Performance • Smoothness • Stability</p>
</header>

<div class="glass" style="margin:20px;">
  <a href="9t.html" class="btn">Redmi 9T (Chime)</a>
  <a href="11i.html" class="btn">Xiaomi 11i (Pissarro)</a>
  <a href="n13.html" class="btn">Redmi Note 13 5G (Ruby)</a>
</div>

</body>
</html>
