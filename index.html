<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrickOS</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: white;
  overflow-x: hidden;
}

/* Background animation */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* PAGE TRANSITION STATES */
body.exit {
  transform: translateX(-100px) scale(0.95);
  opacity: 0;
  filter: blur(8px);
  transition: all 0.5s ease;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: #0f0f0f;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
  z-index: 999;
}

.overlay.active {
  opacity: 1;
}

/* HEADER */
header {
  text-align: center;
  padding: 60px 20px;
}

/* LOGO */
.logo {
  width: 110px;
  border-radius: 25px;
  box-shadow: 0 0 25px rgba(255,60,60,0.6);
}

/* TITLE */
header h1 {
  font-size: 42px;
  background: linear-gradient(45deg, #ff3c3c, #ff7a7a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* CARDS */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  width: 280px;
  margin: 15px;
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 0 25px rgba(255,60,60,0.6);
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 18px;
  background: linear-gradient(45deg, #ff3c3c, #ff7a7a);
  border-radius: 10px;
  text-decoration: none;
  color: white;
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<header>
  <img src="Images/logo.jpg" class="logo">
  <h1>BrickOS</h1>
  <p>Next-Level Custom ROM Experience</p>
</header>

<div class="container">

  <div class="card">
    <h3>Redmi 9T</h3>
    <a href="9t.html" class="btn nav">Open</a>
  </div>

  <div class="card">
    <h3>Xiaomi 11i</h3>
    <a href="11i.html" class="btn nav">Open</a>
  </div>

  <div class="card">
    <h3>Redmi Note 13</h3>
    <a href="n13.html" class="btn nav">Open</a>
  </div>

</div>

<script>
const overlay = document.getElementById("overlay");

document.querySelectorAll(".nav").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    const url = this.href;

    overlay.classList.add("active");
    document.body.classList.add("exit");

    setTimeout(() => {
      window.location.href = url;
    }, 450);
  });
});
</script>

</body>
</html>
